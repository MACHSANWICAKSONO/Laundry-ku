<!DOCTYPE html>
<html lang="id">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Data Laundry | LaundryKu</title>

    <!-- Bootstrap -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">

    <!-- Bootstrap Icons -->
    <link rel="stylesheet"
        href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">

    <!-- CSS -->
    <link rel="stylesheet" href="../assets/css/style.css">
</head>

<body>

    <!-- Navbar -->
    <nav class="navbar navbar-expand-lg navbar-dark bg-primary shadow">

        <div class="container">

            <a class="navbar-brand fw-bold" href="../index.html">
                <i class="bi bi-bucket-fill"></i> LaundryKu
            </a>

            <div class="navbar-nav ms-auto">
                <a class="nav-link" href="../index.html">Dashboard</a>
                <a class="nav-link" href="pelanggan.html">Pelanggan</a>
                <a class="nav-link active" href="laundry.html">Laundry</a>
                <a class="nav-link" href="pembayaran.html">Pembayaran</a>
                
            </div>

        </div>

    </nav>

    <!-- Content -->
    <div class="container py-4">

        <h2 class="fw-bold mb-4">Data Laundry</h2>

        <!-- Form Input -->
        <div class="card shadow border-0 mb-4">

            <div class="card-header bg-primary text-white">
                Form Laundry
            </div>

            <div class="card-body">

                <div class="row">

                    <div class="col-md-4 mb-3">
                        <label class="form-label">Nama Pelanggan</label>
                        <input type="text"
                            id="namaPelanggan"
                            class="form-control"
                            placeholder="Masukkan nama pelanggan">
                    </div>

                    <div class="col-md-4 mb-3">
                        <label class="form-label">Jenis Laundry</label>
                        <select id="jenisLaundry" class="form-select">
                            <option>Cuci Kering</option>
                            <option>Cuci Setrika</option>
                            <option>Express</option>
                        </select>
                    </div>

                    <div class="col-md-4 mb-3">
                        <label class="form-label">Berat (Kg)</label>
                        <input type="number"
                            id="beratLaundry"
                            class="form-control"
                            placeholder="Masukkan berat">
                    </div>

                    <div class="col-md-4 mb-3">
                        <label class="form-label">Status</label>
                        <select id="statusLaundry" class="form-select">
                            <option>Diproses</option>
                            <option>Dicuci</option>
                            <option>Selesai</option>
                        </select>
                    </div>

                    <div class="col-md-4 mb-3">
                        <label class="form-label">Tanggal Masuk</label>
                        <input type="date"
                            id="tanggalMasuk"
                            class="form-control">
                    </div>

                    <div class="col-md-4 mb-3 d-grid">
                        <label class="form-label">&nbsp;</label>

                        <button
                            class="btn btn-primary"
                            onclick="tambahLaundry()">

                            <i class="bi bi-plus-circle"></i>
                            Tambah Data

                        </button>
                    </div>

                </div>

            </div>

        </div>

        <!-- Tabel Laundry -->
        <div class="card shadow border-0">

            <div class="card-header bg-primary text-white">
                Daftar Laundry
            </div>

            <div class="card-body">

                <table class="table table-striped table-hover align-middle">

                    <thead class="table-primary">

                        <tr>
                            <th>No</th>
                            <th>Pelanggan</th>
                            <th>Jenis</th>
                            <th>Berat</th>
                            <th>Status</th>
                            <th>Aksi</th>
                        </tr>

                    </thead>

                    <tbody id="tabelLaundry">

                        <tr>
                            <td>1</td>
                            <td>Andi</td>
                            <td>Cuci Kering</td>
                            <td>3 Kg</td>
                            <td>
                                <span class="badge bg-warning text-dark">
                                    Diproses
                                </span>
                            </td>

                            <td>
                                <button class="btn btn-warning btn-sm">
                                    <i class="bi bi-pencil"></i>
                                </button>

                                <button class="btn btn-danger btn-sm">
                                    <i class="bi bi-trash"></i>
                                </button>
                            </td>
            
                        </tr>
                                        <tr>
                            <td>2</td>
                            <td>Budi</td>
                            <td>Express</td>
                            <td>2 Kg</td>
                            <td>
                                <span class="badge bg-success">
                                    Selesai
                                </span>
                            </td>

                            <td>
                                <button class="btn btn-warning btn-sm">
                                    <i class="bi bi-pencil"></i>
                                </button>

                                <button class="btn btn-danger btn-sm">
                                    <i class="bi bi-trash"></i>
                                </button>
                            </td>
                        </tr>

                    </tbody>

                </table>

            </div>

        </div>

    </div>

    <!-- Bootstrap -->
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>

    <!-- JavaScript -->
    <script src="../assets/js/main.js"></script>

</body>

</html>
