<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">
<link rel="stylesheet" href="../assets/css/style.css">

</head>
<body>

<nav class="navbar navbar-expand-lg navbar-dark bg-primary">
<div class="container">

<a class="navbar-brand fw-bold" href="../index.html">
<i class="bi bi-bucket-fill"></i> LaundryKu
</a>

<div class="navbar-nav ms-auto">
<a class="nav-link" href="../index.html">Dashboard</a>
<a class="nav-link" href="pelanggan.html">Pelanggan</a>
<a class="nav-link" href="laundry.html">Laundry</a>

</div>

</div>

<div class="container py-4">

<h2 class="mb-4">Pembayaran</h2>

<div class="card shadow mb-4">

<div class="card-body">

<div class="row">

<div class="col-md-6 mb-3">
<label class="form-label">Nama Pelanggan</label>
<input type="text" class="form-control" id="namaBayar">
</div>

<div class="col-md-6 mb-3">
<label class="form-label">Total Pembayaran</label>
<input type="number" class="form-control" id="totalBayar">
</div>

<div class="col-md-6 mb-3">
<label class="form-label">Metode Pembayaran</label>

<select class="form-select" id="metodeBayar">
<option>Tunai</option>
<option>Transfer Bank</option>
<option>QRIS</option>
</select>

</div>

<div class="col-md-6 mb-3">
<label class="form-label">Status</label>

<select class="form-select" id="statusBayar">
<option>Lunas</option>
<option>Belum Lunas</option>
</select>

</div>

<div class="col-md-12 d-grid">

<button class="btn btn-primary" onclick="tambahPembayaran()">
<i class="bi bi-credit-card"></i>
Simpan Pembayaran
</button>

</div>

</div>

</div>

</div>

<div class="card shadow">

<div class="card-header bg-primary text-white">
Riwayat Pembayaran
</div>

<div class="card-body">

<table class="table table-striped table-hover">

<thead>

<tr>
<th>No</th>
<th>Nama</th>
<th>Total</th>
<th>Metode</th>
<th>Status</th>
</tr>

</thead>

<tbody id="tabelPembayaran">

<tr>
<td>1</td>
<td>Andi</td>
<td>Rp30.000</td>
<td>QRIS</td>
<td><span class="badge bg-success">Lunas</span></td>
</tr>

<tr>
<td>2</td>
<td>Budi</td>
<td>Rp45.000</td>
<td>Tunai</td>
<td><span class="badge bg-danger">Belum Lunas</span></td>
</tr>

</tbody>

</table>

</div>

</div>

</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>

<script src="../assets/js/main.js"></script>

</body>
</html>
