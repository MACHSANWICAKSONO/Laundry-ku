<!DOCTYPE html>
<html lang="id">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Data Pelanggan | LaundryKu</title>

    <!-- Bootstrap -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">

    <!-- Bootstrap Icons -->
    <link rel="stylesheet"
        href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">

    <!-- CSS -->
    <link rel="stylesheet" href="../assets/css/style.css">
</head>

<body>

    <!-- Navbar -->
    <nav class="navbar navbar-expand-lg navbar-dark bg-primary shadow">

        <div class="container">

            <a class="navbar-brand fw-bold" href="../index.html">
                <i class="bi bi-bucket-fill"></i> LaundryKu
            </a>

            <div class="navbar-nav ms-auto">
                <a class="nav-link" href="../index.html">Dashboard</a>
                <a class="nav-link active" href="pelanggan.html">Pelanggan</a>
                <a class="nav-link" href="laundry.html">Laundry</a>
                <a class="nav-link" href="pembayaran.html">Pembayaran</a>
                
            </div>

        </div>

    </nav>

    <!-- Content -->
    <div class="container py-4">

        <div class="d-flex justify-content-between align-items-center mb-3">

            <h2 class="fw-bold">Data Pelanggan</h2>

            <button class="btn btn-primary"
                data-bs-toggle="modal"
                data-bs-target="#modalPelanggan">

                <i class="bi bi-person-plus-fill"></i>
                Tambah Pelanggan

            </button>

        </div>

        <input type="text"
            class="form-control mb-3"
            placeholder="Cari pelanggan...">

        <table class="table table-bordered table-hover">

            <thead class="table-primary">

                <tr>
                    <th>No</th>
                    <th>Nama</th>
                    <th>No HP</th>
                    <th>Alamat</th>
                    <th>Aksi</th>
                </tr>

            </thead>

            <tbody id="tabelPelanggan">
                
            </td>

                </tr>

            </tbody>

        </table>

    </div>

    <!-- Modal Tambah Pelanggan -->
    <div class="modal fade" id="modalPelanggan" tabindex="-1">

        <div class="modal-dialog">

            <div class="modal-content">

                <div class="modal-header">

                    <h5 class="modal-title">
                        Tambah Pelanggan
                    </h5>

                    <button class="btn-close"
                        data-bs-dismiss="modal"></button>

                </div>

                <div class="modal-body">

                    <input type="text"
                        id="nama"
                        class="form-control mb-3"
                        placeholder="Nama Pelanggan">

                    <input type="text"
                        id="hp"
                        class="form-control mb-3"
                        placeholder="Nomor HP">

                    <input type="text"
                        id="alamat"
                        class="form-control"
                        placeholder="Alamat">

                </div>

                <div class="modal-footer">

                    <button class="btn btn-secondary"
                        data-bs-dismiss="modal">
                        Batal
                    </button>

                    <button class="btn btn-primary"
                        onclick="tambahPelanggan()">
                        Simpan
                    </button>

                </div>

            </div>

        </div>

    </div>

    <!-- Bootstrap -->
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>

    <!-- JavaScript -->
    <script src="../assets/js/main.js"></script>

</body>

</html>
